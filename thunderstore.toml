[config]
schemaVersion = "0.0.1"

[package]
namespace = "Sparroh"
name = "MovementToggles"
description = "Adds optional toggle aim and toggle crouch for Mycopunk. Aim becomes press-to-toggle instead of hold; crouch stays engaged until toggled off."
websiteUrl = "https://github.com/Little-Sparroh/MovementToggles"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_Mycopunk = "5.4.2403"

[build]
icon = "icon.png"
readme = "README.md"
outdir = "build"

[[build.copy]]
source = "bin/Release/net48/MovementToggles.dll"
target = "BepInEx/plugins/MovementToggles.dll"

[[build.copy]]
source = "CHANGELOG.md"
target = "CHANGELOG.md"

[[build.copy]]
source = "LICENSE"
target = "LICENSE"

[publish]
repository = "https://thunderstore.io"
communities = [ "mycopunk" ]

[publish.categories]
mycopunk = [ "client" ]
